defaults:
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled
  - _self_

output: pure/artifacts/exact_h3.npz
emission: reachable_layers
horizon: 3
root_states:
  - [0, 0, 0, 0]
progress_every: 250

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
