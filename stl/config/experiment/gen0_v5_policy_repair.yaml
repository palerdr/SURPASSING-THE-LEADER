# @package _global_
experiment:
  description: Policy-only saddle-gap repair for a value-eligible V5 candidate.
command:
  targets: stl/outputs/regen2rl/gen0_v5_train.npz
  validation_targets: stl/outputs/regen2rl/gen0_v5_development.npz
  policy_certificates: stl/outputs/regen2rl/gen0_v5_train.certificates.npz
  validation_policy_certificates: stl/outputs/regen2rl/gen0_v5_development.certificates.npz
  training_taxonomy: stl/outputs/regen2rl/gen0_v5_train.taxonomy.json
  out: stl/outputs/regen2rl/gen0_v5_policy_repair/s${command.seed}
  init_checkpoint: ???
  epochs: 100
  batch_size: 128
  lr: 0.0003
  hidden_dim: 192
  early_stopping_patience: 20
  trainable_parts: policy_head
  policy_loss_weight: 0.0
  policy_saddle_gap_weight: 1.0
  policy_saddle_gap_tail_weight: 1.0
  checkpoint_selection_metric: saddle_gap_then_value
  source_batch_count:
    - bellman_successor_h2:45
    - bellman_root_h2:13
    - bellman_root_h3:26
    - exact_horizon_2:10
    - exact_horizon_3:9
    - tablebase:6
    - terminal:6
    - tier_a:13
  policy_source_weight:
    - bellman_successor_h2:0.006666666666666667
    - bellman_root_h2:0.0
    - bellman_root_h3:0.019230769230769232
    - exact_horizon_2:0.01
    - exact_horizon_3:0.011111111111111112
    - tablebase:0.0
    - terminal:0.0
    - tier_a:0.0
