# @package _global_
experiment:
  description: Escalation-only V4 trunk/value repair with source-restricted distillation.
command:
  targets: stl/outputs/regen2rl/gen0_v4_train.npz
  validation_targets: stl/outputs/regen2rl/gen0_v4_development.npz
  training_taxonomy: stl/outputs/regen2rl/gen0_v4_train.taxonomy.json
  out: stl/outputs/regen2rl/gen0_v4_trunk_value/lr${command.lr}_s${command.seed}
  epochs: 100
  batch_size: 128
  lr: 0.0001
  weight_decay: 0.0001
  policy_loss_weight: 0.0
  hidden_dim: 192
  init_checkpoint: ???
  reference_checkpoint: stl/outputs/regen2rl/gen0_scaled_gap_finetune/h192_s0/best.pt
  value_distill_weight: 0.25
  value_distill_source:
    - exact_horizon_2
    - exact_horizon_3
    - terminal
    - tier_a
  trainable_parts: trunk_value
  early_stopping_patience: 20
  seed: 0
  device: cpu
  source_batch_count:
    - "exact_horizon_2:48"
    - "exact_horizon_3:24"
    - "tier_a:16"
    - "tablebase_single_overflow:8"
    - "tablebase_double_overflow:8"
    - "tablebase_interior:12"
    - "terminal:12"
  source_weight:
    - "exact_horizon_2:0.004166666666666667"
    - "exact_horizon_3:0.008333333333333333"
    - "tier_a:0.00625"
    - "tablebase:0.009375"
    - "tablebase_interior:0.016666666666666666"
    - "terminal:0.0125"
