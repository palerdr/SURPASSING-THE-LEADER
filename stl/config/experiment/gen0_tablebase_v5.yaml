# @package _global_
experiment:
  description: Fresh V5 calibration holdout; prior V4 evidence remains disclosed development.
command:
  profile: scaled_v4
  smoke: false
  split_seed: 20260716
  train_out: stl/outputs/regen2rl/gen0_v5_calibration_train.npz
  dev_out: stl/outputs/regen2rl/gen0_v5_calibration_development.npz
  ruler_out: stl/outputs/regen2rl/gen0_v5_calibration_holdout.npz
  work_dir: stl/outputs/regen2rl/gen0_v5_calibration_work
  holdout_seal_out: stl/outputs/regen2rl/gen0_v5_calibration_only.seal.json
  tier_a_rows: 384
  workers: 4
  chunk_size: 16
  blocked_artifact:
    - stl/outputs/regen2rl/gen0_scaled_train_v3.npz
    - stl/outputs/regen2rl/gen0_scaled_development_v3.npz
    - stl/outputs/regen2rl/gen0_scaled_external_ruler_v3.npz
    - stl/outputs/regen2rl/gen0_v4_train.npz
    - stl/outputs/regen2rl/gen0_v4_development.npz
    - stl/outputs/regen2rl/gen0_v4_sealed_holdout.npz
  reuse_train_artifact: stl/outputs/regen2rl/gen0_v4_train.npz
  reuse_dev_artifact: stl/outputs/regen2rl/gen0_v4_development.npz
