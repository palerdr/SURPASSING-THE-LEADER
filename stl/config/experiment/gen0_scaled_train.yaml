# @package _global_
experiment:
  description: Source-balanced model-selection run on the scaled Gen-0 corpus.
command:
  targets: stl/outputs/regen2rl/gen0_scaled_train_v3.npz
  validation_targets: stl/outputs/regen2rl/gen0_scaled_development_v3.npz
  out: stl/outputs/regen2rl/gen0_scaled_ladder/h${command.hidden_dim}_s${command.seed}
  epochs: 100
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0001
  policy_loss_weight: 1.0
  hidden_dim: 64
  early_stopping_patience: 20
  seed: 0
  device: cpu
  allow_legacy_targets: false
  source_batch_count:
    - "exact_horizon_2:48"
    - "exact_horizon_3:24"
    - "tier_a:16"
    - "tablebase:16"
    - "tablebase_interior:12"
    - "terminal:12"
  source_weight:
    - "exact_horizon_2:0.004166666666666667"
    - "exact_horizon_3:0.008333333333333333"
    - "tier_a:0.00625"
    - "tablebase:0.009375"
    - "tablebase_interior:0.016666666666666666"
    - "terminal:0.0125"
  policy_source_weight:
    - "exact_horizon_2:0.011458333333333333"
    - "exact_horizon_3:0.01875"
