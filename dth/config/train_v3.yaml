defaults:
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled
  - _self_

dataset: dth/artifacts/strategic_exact_v3.npz
output_dir: dth/checkpoints/strategic_exact_v3
seed: 4
device: cuda

model:
  hidden_width: 64
  hidden_layers: 2
  horizon_scale: 3.0

training:
  epochs: 500
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.00001
  validation_fraction: 0.2
  policy_weight: 0.35
  patience: 80
  minimum_delta: 0.000001
  log_every: 25

audit:
  max_rows_per_horizon: 8

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
