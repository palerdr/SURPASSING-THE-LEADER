defaults:
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled
  - _self_

checkpoint: dth/checkpoints/strategic_exact_v4/best.pt
device: cpu
output: dth/artifacts/mcts_search_gate_exact_v2.json
evaluators: [exact_leaf]
budgets: [0, 1024, 4096]
seeds: [0, 1, 2]
warmup_cells: [0, 900, 3600]

mcts:
  confidence_constant: 1.5
  exploration_scale: 1.0
  prior_uniform_mix: 0.05
  policy_update_interval: 16
  root_warmup_cells: 0
  internal_warmup_cells: 0
  max_depth: 1

roots:
  - state: [240, 0, 0, 0]
    horizon: 1
  - state: [0, 240, 240, 0]
    horizon: 2

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
